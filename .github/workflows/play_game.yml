name: Play Tic-Tac-Toe

on:
  issues:
    types: [opened]

jobs:
  play:
    if: startsWith(github.event.issue.title, 'ttplay|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Process Move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python play_game.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md game_state.json
          git commit -m "Update Tic-Tac-Toe board [skip ci]" || echo "No changes to commit"
          git push

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Move registered! Board updated. Check out the README on your profile to see the new state!"
